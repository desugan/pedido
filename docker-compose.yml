version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pedido-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - pedido-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10

  flask:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pedido-flask
    environment:
      FLASK_ENV: development
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend_flask:/app/backend_flask
      - ./frontend:/app/frontend
    networks:
      - pedido-network
    command: python3 backend_flask/run.py

volumes:
  mysql-data:
    driver: local

networks:
  pedido-network:
    driver: bridge
